name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm pack --dry-run

      - run: npm run build:demo

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: 'npm version patch -m "chore(release): %s [skip ci]"'

      - name: Prepare publish package (without README)
        run: |
          rm -rf .npm-publish
          mkdir -p .npm-publish/dist
          cp package.json LICENSE CHANGELOG.md .npm-publish/
          cp -R dist/. .npm-publish/dist/

      - name: Publish package to npm (Trusted Publishing)
        id: npm_publish_trusted
        if: ${{ env.HAS_NPM_TOKEN != 'true' }}
        run: npm publish ./.npm-publish --provenance --access public --ignore-scripts

      - name: Publish package to npm (Token fallback)
        id: npm_publish_token
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        run: npm publish ./.npm-publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version commit and tag
        run: git push origin HEAD:main --follow-tags

      - name: Deploy demo to GitHub Pages
        if: ${{ steps.npm_publish_trusted.outcome == 'success' || steps.npm_publish_token.outcome == 'success' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./demo-dist
